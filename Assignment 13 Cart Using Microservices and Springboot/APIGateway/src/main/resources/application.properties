spring.application.name=APIGateway
server.port=8088
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=product-route
spring.cloud.gateway.routes[0].uri=lb://PRODUCT
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/**

spring.cloud.gateway.routes[1].id=pricing-route
spring.cloud.gateway.routes[1].uri=lb://PRICING
spring.cloud.gateway.routes[1].predicates[0]=Path=/prices/**

spring.cloud.gateway.routes[2].id=inventory-route
spring.cloud.gateway.routes[2].uri=lb://INVENTORY
spring.cloud.gateway.routes[2].predicates[0]=Path=/stocks/**

spring.cloud.gateway.routes[3].id=catalog-route
spring.cloud.gateway.routes[3].uri=lb://PRODUCTCATALOG
spring.cloud.gateway.routes[3].predicates[0]=Path=/catalogs/**

spring.cloud.gateway.routes[4].id=cart-route
spring.cloud.gateway.routes[4].uri=lb://CART
spring.cloud.gateway.routes[4].predicates[0]=Path=/carts/**

spring.cloud.gateway.routes[5].id=recommendation-route
spring.cloud.gateway.routes[5].uri=lb://RECOMMENDATION
spring.cloud.gateway.routes[5].predicates[0]=Path=/recommendations/**
